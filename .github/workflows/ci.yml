name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Run self-tests
        run: ./scripts/test.sh
      - name: Build release executable
        run: swift build -c release --product CodexQuotaMonitor
